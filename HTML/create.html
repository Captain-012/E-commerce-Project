<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CCollection Sign Up</title>
    <link rel="stylesheet" href="../CSS/create.css">
    <!-- Google Font -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">

    <!-- Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">

</head>

<body>

    <div class="container">

        <div class="logo-box">

            <!-- Replace this src with your logo image -->
            <img src="../multimedia/collection.png" alt="logo" class="logo">

            <h1 class="brand-name">CCollection</h1>

            <p class="subtitle">
                Create your account to get started
            </p>

        </div>

        <!-- Full Name -->
        <div class="input-group">
            <label>Full Name</label>

            <div class="input-box">
                <i class="fa-regular fa-user"></i>

                <input id="username" type="text" placeholder="captain america">
            </div>
        </div>

        <!-- Email -->
        <div class="input-group">
            <label>Email Address</label>

            <div class="input-box">
                <i class="fa-regular fa-envelope"></i>

                <input id="email" type="email" placeholder="you@example.com">
            </div>
        </div>

        <!-- Password -->
        <div class="input-group">
            <label>Password</label>

            <div class="input-box">
                <i class="fa-solid fa-lock"></i>

                <input type="password" id="password" placeholder="********">
            </div>
        </div>

        <!-- Terms -->
        <div class="terms">
            <input type="checkbox">

            <p>
                I agree to the
                <a href="#">Terms</a>
                and
                <a href="#">Privacy Policy</a>
            </p>
        </div>

        <!-- Button -->
        <button id="signup" class="btn">
            Sign Up
        </button>

        <div class="login-text">
            Already have an account?
            <a href="../HTML/login.html">Log in</a>
        </div>

    </div>

    <script type="module" src="/js/create.js"></script>
    <script src="/js/theme.js"></script>
</body>

</html>
